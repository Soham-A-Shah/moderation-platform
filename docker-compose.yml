services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: moderation
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infrastructure/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d moderation"]
      interval: 5s
      timeout: 5s
      retries: 10

  redpanda:
    image: redpandadata/redpanda:v24.1.7
    command:
      - redpanda
      - start
      - --overprovisioned
      - --smp=1
      - --memory=512M
      - --reserve-memory=0M
      - --node-id=0
      - --check=false
      - --kafka-addr=PLAINTEXT://0.0.0.0:9092
      - --advertise-kafka-addr=PLAINTEXT://redpanda:9092
    ports:
      - "9092:9092"

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: redpanda:9092
    depends_on:
      - redpanda

  api-gateway:
    build:
      context: .
      dockerfile: backend/api-gateway/Dockerfile
    env_file: .env.example
    ports:
      - "8010:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redpanda:
        condition: service_started

  ingestion-service:
    build:
      context: .
      dockerfile: backend/services/ingestion-service/Dockerfile
    env_file: .env.example
    depends_on:
      postgres:
        condition: service_healthy
      redpanda:
        condition: service_started

  ml-inference-service:
    build:
      context: .
      dockerfile: backend/services/ml-inference-service/Dockerfile
    env_file: .env.example
    depends_on:
      - redpanda

  moderation-service:
    build:
      context: .
      dockerfile: backend/services/moderation-service/Dockerfile
    env_file: .env.example
    depends_on:
      postgres:
        condition: service_healthy
      redpanda:
        condition: service_started

  notification-service:
    build:
      context: .
      dockerfile: backend/services/notification-service/Dockerfile
    env_file: .env.example
    depends_on:
      - redpanda

  analytics-service:
    build:
      context: .
      dockerfile: backend/services/analytics-service/Dockerfile
    env_file: .env.example
    depends_on:
      postgres:
        condition: service_healthy
      redpanda:
        condition: service_started

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    ports:
      - "3000:3000"
    depends_on:
      - api-gateway

volumes:
  postgres_data:
