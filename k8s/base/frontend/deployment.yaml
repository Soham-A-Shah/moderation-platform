apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: moderation
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: frontend:latest
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: app-config
            - secretRef:
                name: app-secrets

          ports:
            - containerPort: 3000

          resources:
            requests:
              cpu: 50m
              memory: 96Mi
            limits:
              cpu: 400m
              memory: 384Mi
