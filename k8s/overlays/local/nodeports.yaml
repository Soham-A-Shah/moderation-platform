apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: moderation
spec:
  type: NodePort
  ports:
    - port: 3000
      targetPort: 3000
      nodePort: 30000
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: moderation
spec:
  type: NodePort
  ports:
    - port: 8000
      targetPort: 8000
      nodePort: 30010
---
apiVersion: v1
kind: Service
metadata:
  name: kafka-ui
  namespace: moderation
spec:
  type: NodePort
  ports:
    - port: 8080
      targetPort: 8080
      nodePort: 30080
