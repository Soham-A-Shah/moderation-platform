apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base

patches:
  - path: nodeports.yaml
  - path: resource-limits.yaml

images:
  - name: api-gateway
    newName: api-gateway
    newTag: latest
  - name: frontend
    newName: frontend
    newTag: latest
  - name: ingestion-service
    newName: ingestion-service
    newTag: latest
  - name: ml-inference-service
    newName: ml-inference-service
    newTag: latest
  - name: moderation-service
    newName: moderation-service
    newTag: latest
  - name: notification-service
    newName: notification-service
    newTag: latest
  - name: analytics-service
    newName: analytics-service
    newTag: latest
