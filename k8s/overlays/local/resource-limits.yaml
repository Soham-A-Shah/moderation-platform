---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kafka-ui
  namespace: moderation
spec:
  template:
    spec:
      containers:
        - name: kafka-ui
          env:
            - name: JAVA_OPTS
              value: "-Xms64m -Xmx256m"
          resources:
            requests:
              cpu: 25m
              memory: 128Mi
            limits:
              cpu: 400m
              memory: 384Mi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: moderation
spec:
  template:
    spec:
      containers:
        - name: postgres
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 400m
              memory: 384Mi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redpanda
  namespace: moderation
spec:
  template:
    spec:
      containers:
        - name: redpanda
          args:
            - redpanda
            - start
            - --overprovisioned
            - --smp=1
            - --memory=256M
            - --reserve-memory=0M
            - --node-id=0
            - --check=false
            - --kafka-addr=PLAINTEXT://0.0.0.0:9092
            - --advertise-kafka-addr=PLAINTEXT://redpanda:9092
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 600m
              memory: 512Mi
