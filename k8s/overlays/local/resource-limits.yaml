apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: moderation
spec:
  template:
    spec:
      containers:
        - name: api-gateway
          resources:
            requests:
              cpu: 25m
              memory: 96Mi
            limits:
              cpu: 300m
              memory: 256Mi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: moderation
spec:
  template:
    spec:
      containers:
        - name: frontend
          resources:
            requests:
              cpu: 25m
              memory: 128Mi
            limits:
              cpu: 400m
              memory: 512Mi
---
apiVersion: apps/v1
kind: Deployment
